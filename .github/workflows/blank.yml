name: Build Wasp AI for ARM64 Linux

on:
  workflow_dispatch:

jobs:
  build-binary:
    # CHANGED: Use GitHub's native ARM64 Ubuntu runner
    runs-on: ubuntu-24.04-arm64

    steps:
    - name: Check out Wasp source
      uses: actions/checkout@v4
      with:
        repository: 'wasp-lang/wasp'
        ref: 'main'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential curl libgmp-dev libffi-dev zlib1g-dev libncurses-dev

    - name: Set up Haskell GHC Toolchain
      uses: haskell-actions/setup@v2
      with:
        ghc-version: '9.6' # Explicitly lock to Wasp's tested long-term support version
        cabal-version: 'latest'

    - name: Cache Haskell Compiler Assets
      uses: actions/cache@v4
      with:
        path: |
          ~/.cabal/packages
          ~/.cabal/store
          waspc/dist-newstyle
        key: ${{ runner.os }}-cabal-${{ hashFiles('**/*.cabal') }}

    - name: Configure and Compile Wasp
      run: |
        cd waspc
        cabal update
        cabal build exe:wasp
        
        # Move the binary out of the hidden cabal folders into the root workspace
        cp $(cabal list-bin exe:wasp) ../wasp-bin-arm64

    - name: Upload Native ARM64 Binary
      uses: actions/upload-artifact@v4
      with:
        name: wasp-linux-arm64
        path: wasp-bin-arm64
        
