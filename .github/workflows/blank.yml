name: Build Wasp AI for ARM64 Linux

on:
  workflow_dispatch: # Allows you to manually click "Run" in your GitHub browser

jobs:
  build-binary:
    # Use standard Ubuntu runner - we will cross-compile to arm64 inside it
    runs-on: ubuntu-latest

    steps:
    - name: Check out the official Wasp code
      uses: actions/checkout@v4
      with:
        repository: 'wasp-lang/wasp'
        ref: 'main' # Compiles the latest main branch version

    - name: Set up Haskell GHC Toolchain
      uses: haskell-actions/setup@v2
      with:
        ghc-version: 'latest'
        cabal-version: 'latest'

    - name: Install System Architecture Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libgmp-dev

    - name: Cache Haskell Compiler Assets
      uses: actions/cache@v4
      with:
        path: |
          ~/.cabal/packages
          ~/.cabal/store
          waspc/dist-newstyle
        key: ${{ runner.os }}-cabal-${{ hashFiles('**/*.cabal') }}

    - name: Configure and Compile Wasp
      run: |
        cd waspc
        cabal update
        # Set target to Linux ARM64 (AArch64) during compilation
        cabal configure --with-compiler=ghc --ghc-options="-target aarch64-unknown-linux-gnu"
        cabal build exe:wasp

    - name: Upload the Compiled ARM64 Binary
      uses: actions/upload-artifact@v4
      with:
        name: wasp-linux-arm64
        path: waspc/dist-newstyle/build/aarch64-unknown-linux-gnu/*/wasp-*/x/wasp/build/wasp/wasp
        
