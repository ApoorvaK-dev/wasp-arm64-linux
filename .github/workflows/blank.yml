name: Build Wasp AI for ARM64 Linux

on:
  workflow_dispatch:

jobs:
  build-binary:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Wasp source
      uses: actions/checkout@v4
      with:
        repository: 'wasp-lang/wasp'
        ref: 'main'

    - name: Set up QEMU for ARM64 Emulation
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Compile inside ARM64 Container
      uses: addnab/docker-run-action@v3
      with:
        image: arm64v8/ubuntu:22.04
        # FIXED: Added the --platform tag so Docker knows to use QEMU emulation
        options: -v ${{ github.workspace }}:/workspace --platform linux/arm64
        run: |
          apt-get update
          apt-get install -y build-essential curl libgmp-dev libffi-dev zlib1g-dev libncurses-dev
          
          # Install GHCup natively inside the emulated container
          export BOOTSTRAP_HASKELL_NONINTERACTIVE=1
          export BOOTSTRAP_HASKELL_MINIMAL=1
          curl --proto '=https' --tlsv1.2 -sSf haskell.org | sh
          . /root/.ghcup/env
          ghcup install ghc latest --set
          ghcup install cabal latest --set
          
          # Build the binary
          cd /workspace/waspc
          cabal update
          cabal build exe:wasp
          
          # Move the compiled binary file to the main folder
          cp $(cabal list-bin exe:wasp) /workspace/wasp-bin-arm64

    - name: Upload Native ARM64 Binary
      uses: actions/upload-artifact@v4
      with:
        name: wasp-linux-arm64
        path: wasp-bin-arm64
        
